name: Build and deploy Hugo site

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

env:
  HUGO_VERSION: 0.147.3
  HUGO_ENVIRONMENT: production
  HUGO_ENV: production
  TZ: UTC

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure repository diagnostics
        run: |
          set -euo pipefail
          git config core.quotepath false
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Ref: ${GITHUB_REF}"
          echo "SHA: ${GITHUB_SHA}"
          echo "Actor: ${GITHUB_ACTOR}"
          echo "::group::Submodules"
          git submodule status --recursive
          echo "::endgroup::"

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Hugo Extended
        run: |
          set -euo pipefail
          echo "::group::Download Hugo ${HUGO_VERSION}"
          curl --fail --show-error --location --retry 3 --retry-delay 5 \
            --output "${RUNNER_TEMP}/hugo.tar.gz" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir -p "${RUNNER_TEMP}/hugo"
          tar -xzf "${RUNNER_TEMP}/hugo.tar.gz" -C "${RUNNER_TEMP}/hugo"
          echo "${RUNNER_TEMP}/hugo" >> "${GITHUB_PATH}"
          echo "::endgroup::"

      - name: Verify toolchain
        run: |
          set -euo pipefail
          hugo version
          git --version
          echo "GitHub Pages base URL: ${{ steps.pages.outputs.base_url }}/"

      - name: Restore Hugo cache
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-${{ runner.os }}-${{ env.HUGO_VERSION }}-${{ github.run_id }}
          restore-keys: |
            hugo-${{ runner.os }}-${{ env.HUGO_VERSION }}-
            hugo-${{ runner.os }}-

      - name: Generate build metadata
        run: |
          set -euo pipefail
          mkdir -p data
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="$(git rev-parse --short=7 HEAD)"
          fi
          cat > data/build.json <<EOF
          {
            "build_time": "${build_time}",
            "version": "${version}",
            "commit": "$(git rev-parse HEAD)",
            "branch": "${GITHUB_REF_NAME}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_number": "${GITHUB_RUN_NUMBER}",
            "actor": "${GITHUB_ACTOR}"
          }
          EOF
          cat data/build.json

      - name: Build site
        run: |
          set -euo pipefail
          hugo \
            --gc \
            --minify \
            --cleanDestinationDir \
            --panicOnWarning \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --cacheDir "${{ runner.temp }}/hugo_cache"

      - name: Validate generated site
        run: |
          set -euo pipefail
          test -s public/index.html
          test -s public/sitemap.xml
          test -s public/robots.txt

          symlink="$(find public -type l -print -quit)"
          if [[ -n "${symlink}" ]]; then
            echo "::error::Generated site contains symlinks, which are unsafe for Pages artifacts: ${symlink}"
            exit 1
          fi

          if grep -InE 'https?://(localhost|127\.0\.0\.1)' public/index.html public/sitemap.xml public/robots.txt; then
            echo "::error::Core deployment files contain absolute localhost URLs."
            exit 1
          fi

          localhost_files="$(grep -RIlE 'https?://(localhost|127\.0\.0\.1)' public --include='*.html' --include='*.xml' --include='*.txt' || true)"
          if [[ -n "${localhost_files}" ]]; then
            echo "::warning::Some generated content contains localhost example URLs. This is allowed for technical posts, but review if unexpected."
            echo "${localhost_files}" | sed -n '1,40p'
          fi

          file_count="$(find public -type f | wc -l | tr -d '[:space:]')"
          site_size_mb="$(du -sm public | cut -f1)"
          site_size="$(du -sh public | cut -f1)"
          if (( site_size_mb > 1024 )); then
            echo "::error::Generated site is ${site_size_mb} MB. Review large assets before deploying."
            exit 1
          fi
          echo "::group::Generated site sample"
          find public -maxdepth 2 -type f | sort | sed -n '1,120p'
          echo "::endgroup::"
          {
            echo "### Hugo build summary"
            echo ""
            echo "- Files: ${file_count}"
            echo "- Size: ${site_size}"
            echo "- Base URL: ${{ steps.pages.outputs.base_url }}/"
            echo "- Commit: ${GITHUB_SHA}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Save Hugo cache
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-${{ runner.os }}-${{ env.HUGO_VERSION }}-${{ github.run_id }}

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Publish deployment summary
        run: |
          set -euo pipefail
          {
            echo "### Deployment summary"
            echo ""
            echo "- URL: ${{ steps.deployment.outputs.page_url }}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } >> "${GITHUB_STEP_SUMMARY}"
