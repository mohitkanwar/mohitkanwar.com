baseURL = 'https://mohitkanwar.com/'
languageCode = 'en-us'
title = "Mohit Kanwar | FinTech Architecture, AI, and Engineering Leadership"
theme = "hugo-profile"
pagination.pagerSize = 9
enableRobotsTXT = true
enableGitInfo = true

disqusShortname = "mohitkanwar-com"

[outputs]
	home = ["HTML","RSS","JSON"]

[related]
  threshold = 20
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 120
  [[related.indices]]
    name = "title"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 20
  [[related.indices]]
    name = "type"
    weight = 40

[markup.goldmark.renderer]
  unsafe = true
[params]
  title = "Mohit Kanwar"
  description = "Mohit Kanwar is a Software Architect focused on FinTech, AI-powered digital platforms, and engineering leadership for modern banking outcomes."
  # staticPath = ""  # The path to serve the static files from
  favicon = "/fav.png"
  # Newsletter is temporarily disabled. Set subscribeEnabled = true and content/newsletter.md draft = false to restore it.
  subscribeEnabled = false
  subscribeUrl = "https://mohitkanwar.substack.com/subscribe"

[params.blogQuestionForm]
  enable = true
  title = "Ask a BFSI, FinTech, or architecture question"
  description = "Share the decision, constraint, or tradeoff you are working through. I use reader questions to respond directly where possible and shape future practical articles."
  # Add a Formspree form id to receive submissions directly, for example: formspreeFormId = "abcdefgh"
  formspreeFormId = "xkolzoag"
  formspreeSubmitMode = "native"
  recaptchaSiteKey = "6LdQuTstAAAAAB62bKhcjTMA8xzxMEAB5mY0awzh"
  recaptchaAction = "submit"
  # Optional mailto fallback if you prefer email delivery instead of Formspree.
  recipientEmail = ""
  linkedinUrl = "https://www.linkedin.com/in/mohit-kanwar-7668a211/"

[params.analytics]
  # Google Analytics 4 is enabled for production builds. It remains disabled in local development unless load_in_development is true.
  enabled = true
  provider = "google-analytics"
  google_analytics_measurement_id = "G-GS17GYSGLC"
  respect_do_not_track = true
  load_in_development = false
  allow_google_signals = false
  allow_ad_personalization_signals = false
  debug = false

[params.ads]
  # Google AdSense is wired into blog articles but remains disabled until a publisher id and ad unit slots are configured.
  enabled = false
  provider = "google-adsense"
  adsense_client = "" # Example: ca-pub-1234567890123456
  load_in_development = false

[params.ads.slots.article_footer]
  enabled = true
  slot = "" # AdSense ad unit slot id
  format = "auto"
  full_width_responsive = true

[params.ads.slots.sidebar]
  enabled = true
  slot = "" # AdSense ad unit slot id
  format = "auto"
  full_width_responsive = true

[params.hero]
  enable = true
  intro = "Hi, I am"
  title = "Mohit Kanwar"
  subtitle = "Software Architect | FinTech, AI, and Platform Engineering"
  content = "I help financial institutions and fintech teams design secure, scalable, and outcome-driven digital platforms. Open to speaking opportunities and senior architecture leadership conversations.<div class=\"mk-trust-strip\"><span class=\"mk-trust-item\">FinTech architecture leadership across banks and platform teams</span><span class=\"mk-trust-item\">Cloud-native modernization and AI adoption in regulated environments</span><a class=\"mk-trust-link\" href=\"/solutions/digital-banking-modernization-case-study/\" data-cta-source=\"hero-trust-strip\" data-cta-event=\"cta_case_study_click\">View case study</a></div>"
  image = "/images/me.jpeg"
  roundImage = true
  [params.hero.button]
    enable = true
    name = "Invite Me To Speak"
    url = "/speaking"
    download = false
    newPage = false
  [params.hero.socialLinks]
    [[params.hero.socialLinks.fontAwesomeIcons]]
      icon = "fab fa-linkedin"
      url = "https://www.linkedin.com/in/mohit-kanwar-7668a211/"
    [[params.hero.socialLinks.fontAwesomeIcons]]
      icon = "fab fa-github"
      url = "https://github.com/mohitkanwar"
    [[params.hero.socialLinks.fontAwesomeIcons]]
      icon = "fab fa-stack-overflow"
      url = "https://stackoverflow.com/users/1336558/mohit-kanwar"

[params.navbar]
  align = "ms-auto" # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
  # brandLogo = "/logo.png" # Logo for the brand | default is the favicon variable
  # showBrandLogo = false # Show brand logo in nav bar | default is true
  brandName = "Mohit Kanwar" # Brand name for the brand | default is the title variable
  disableSearch = true
  # searchPlaceholder = "Search"
  [params.navbar.stickyNavBar]
    enable = true
    showOnScrollUp = true
  [params.navbar.menus]
    disableAbout = true
    disableExperience = true
    disableEducation = true
    disableProjects = true
    disableAchievements = true
    disableContact = true
[[Menus.main]]
  identifier = "blog"
  name = "Insights"
  title = "Architecture writing"
  url = "/blogs"
  weight = 1
[[Menus.main]]
  identifier = "videos"
  name = "Videos"
  title = "Short architecture videos"
  url = "/videos"
  weight = 2

[[Menus.main]]
  identifier = "case-study"
  name = "Case Study"
  title = "Proof of architecture leadership"
  url = "/solutions/digital-banking-modernization-case-study"
  weight = 3

[[Menus.main]]
  identifier = "work-with-me"
  name = "Work With Me"
  title = "Leadership and advisory conversations"
  url = "/work-with-me"
  weight = 4

# About
[params.about]
  enable = true
  title = "About"
  image = ""
  content = "<p><strong>I am a Software Architect focused on FinTech and Banking transformation</strong>.</p><p>I work with leadership teams to turn strategy into engineering outcomes through <strong>cloud-native architecture, modern platform design, and AI-enabled customer experiences</strong>.</p><p>My approach combines deep engineering execution with business-first thinking so organizations can ship faster, stay compliant, and scale with confidence.</p><p>I am open to <strong>speaking engagements</strong>, architecture leadership roles, and strategic conversations on digital banking transformation.</p>"

  [params.about.skills]
    enable = true
    title = "Focus Areas:"
    items = [
    "Applied AI in Financial Services",
    "Cloud-Native Architecture & Microservices",
    "Digital Banking Transformation",
    "Product & Platform Engineering Strategy",
    "Data-Driven Decision Systems",
    "Modern Frontend Experiences",
    "Developer Experience & Engineering Excellence"
  ]

