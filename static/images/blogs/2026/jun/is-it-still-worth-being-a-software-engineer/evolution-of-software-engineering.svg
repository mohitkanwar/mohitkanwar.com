<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="850" viewBox="0 0 1500 850" role="img" aria-labelledby="title desc">
  <title id="title">Evolution of software engineering value</title>
  <desc id="desc">A timeline showing how software engineering moved from punch cards to compilers, IDEs, cloud platforms, AI agents, and business architecture.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eefcf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 850 36px Inter, Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font: 500 17px Inter, Arial, sans-serif; fill: #475569; }
      .card { fill: #ffffff; stroke: #dbeafe; stroke-width: 1.5; rx: 16; filter: url(#shadow); }
      .card-title { font: 850 19px Inter, Arial, sans-serif; fill: #0f172a; }
      .card-note { font: 550 13px Inter, Arial, sans-serif; fill: #475569; }
      .era { font: 800 13px Inter, Arial, sans-serif; fill: #2563eb; }
      .line { stroke: #94a3b8; stroke-width: 4; stroke-linecap: round; }
      .dot { fill: #2563eb; stroke: #ffffff; stroke-width: 5; }
      .value { fill: #0f172a; opacity: 0.94; }
      .value-title { font: 850 18px Inter, Arial, sans-serif; fill: #ffffff; }
      .value-note { font: 600 14px Inter, Arial, sans-serif; fill: #dbeafe; }
      .brand { font: 800 13px Inter, Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1500" height="850" fill="url(#bg)"/>
  <text x="50" y="62" class="title">Software Engineering Keeps Moving Up the Value Chain</text>
  <text x="50" y="94" class="subtitle">Every new tool makes one layer easier and shifts value toward judgment, design, domain understanding, and outcomes.</text>

  <g transform="translate(1364 30) scale(0.13)" opacity="0.9">
    <polygon points="250,12 318,92 423,86 416,196 488,250 416,304 423,414 318,408 250,488 182,408 77,414 84,304 12,250 84,196 77,86 182,92" fill="#050505" stroke="#a3a3a3" stroke-width="30" stroke-linejoin="round"/>
    <polygon points="250,32 308,108 404,104 396,202 462,250 396,298 404,396 308,392 250,468 192,392 96,396 104,298 38,250 104,202 96,104 192,108" fill="none" stroke="#525252" stroke-width="10" stroke-linejoin="round"/>
    <ellipse cx="185" cy="195" rx="72" ry="58" fill="#fff" stroke="#111827" stroke-width="6"/>
    <ellipse cx="315" cy="195" rx="72" ry="58" fill="#fff" stroke="#111827" stroke-width="6"/>
    <circle cx="185" cy="195" r="26" fill="#000"/>
    <circle cx="315" cy="195" r="26" fill="#000"/>
    <rect x="225" y="210" width="24" height="118" rx="12" fill="#fff"/>
    <rect x="150" y="240" width="24" height="132" rx="12" fill="#fff"/>
    <rect x="350" y="240" width="24" height="132" rx="12" fill="#fff"/>
  </g>
  <text x="1344" y="114" class="brand">mohitkanwar.com</text>

  <line x1="128" y1="265" x2="1372" y2="265" class="line"/>
  <circle cx="128" cy="265" r="14" class="dot"/>
  <circle cx="377" cy="265" r="14" class="dot"/>
  <circle cx="626" cy="265" r="14" class="dot"/>
  <circle cx="875" cy="265" r="14" class="dot"/>
  <circle cx="1124" cy="265" r="14" class="dot"/>
  <circle cx="1372" cy="265" r="14" class="dot"/>

  <g transform="translate(42 325)">
    <rect class="card" width="212" height="210"/>
    <text x="24" y="38" class="era">EARLY PROGRAMMING</text>
    <text x="24" y="70" class="card-title">Punch Cards</text>
    <text x="24" y="106" class="card-note">High friction.</text>
    <text x="24" y="130" class="card-note">Slow feedback.</text>
    <text x="24" y="154" class="card-note">One mistake could</text>
    <text x="24" y="178" class="card-note">mean doing it again.</text>
  </g>

  <g transform="translate(291 325)">
    <rect class="card" width="212" height="210"/>
    <text x="24" y="38" class="era">LANGUAGE ERA</text>
    <text x="24" y="70" class="card-title">Compilers</text>
    <text x="24" y="106" class="card-note">Less machine detail.</text>
    <text x="24" y="130" class="card-note">Better abstraction.</text>
    <text x="24" y="154" class="card-note">New problems moved</text>
    <text x="24" y="178" class="card-note">into debugging.</text>
  </g>

  <g transform="translate(540 325)">
    <rect class="card" width="212" height="210"/>
    <text x="24" y="38" class="era">IDE ERA</text>
    <text x="24" y="70" class="card-title">Eclipse and IDEs</text>
    <text x="24" y="106" class="card-note">Auto-complete.</text>
    <text x="24" y="130" class="card-note">Code navigation.</text>
    <text x="24" y="154" class="card-note">Faster feedback.</text>
    <text x="24" y="178" class="card-note">Less memorization.</text>
  </g>

  <g transform="translate(789 325)">
    <rect class="card" width="212" height="210"/>
    <text x="24" y="38" class="era">PLATFORM ERA</text>
    <text x="24" y="70" class="card-title">Cloud and DevOps</text>
    <text x="24" y="106" class="card-note">Faster delivery.</text>
    <text x="24" y="130" class="card-note">Reusable platforms.</text>
    <text x="24" y="154" class="card-note">More ownership</text>
    <text x="24" y="178" class="card-note">of operations.</text>
  </g>

  <g transform="translate(1038 325)">
    <rect class="card" width="212" height="210"/>
    <text x="24" y="38" class="era">AI ERA</text>
    <text x="24" y="70" class="card-title">Coding Agents</text>
    <text x="24" y="106" class="card-note">Code generation.</text>
    <text x="24" y="130" class="card-note">Tests and refactors.</text>
    <text x="24" y="154" class="card-note">Automation of</text>
    <text x="24" y="178" class="card-note">repeated work.</text>
  </g>

  <g transform="translate(1286 325)">
    <rect class="card" width="172" height="210"/>
    <text x="20" y="38" class="era">NEXT VALUE</text>
    <text x="20" y="70" class="card-title">Architects</text>
    <text x="20" y="106" class="card-note">Business context.</text>
    <text x="20" y="130" class="card-note">Solution design.</text>
    <text x="20" y="154" class="card-note">Communication.</text>
    <text x="20" y="178" class="card-note">Outcome ownership.</text>
  </g>

  <g transform="translate(80 635)">
    <rect class="value" width="1340" height="112" rx="24"/>
    <text x="34" y="45" class="value-title">What became cheaper?</text>
    <text x="34" y="78" class="value-note">Remembering syntax, writing boilerplate, searching APIs, setting up repetitive scaffolding.</text>
    <text x="670" y="45" class="value-title">What became more valuable?</text>
    <text x="670" y="78" class="value-note">Understanding the business, designing tradeoffs, automating workflows, and owning outcomes.</text>
  </g>
</svg>
