<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Production AI architecture is messy</title>
  <desc id="desc">A cover image showing fragmented AI production architecture components being organized into a governed platform.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.55" stop-color="#10243a"/>
      <stop offset="1" stop-color="#0c332f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#eafaf3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5eead4"/>
    </marker>
    <style>
      .title { font: 900 64px Inter, Arial, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font: 500 25px Inter, Arial, sans-serif; fill: #cbd5e1; }
      .label { font: 800 20px Inter, Arial, sans-serif; fill: #0f172a; }
      .small { font: 600 15px Inter, Arial, sans-serif; fill: #475569; }
      .chip { fill: rgba(255,255,255,0.12); stroke: rgba(148,163,184,0.35); stroke-width: 1.5; }
      .chip-text { font: 700 17px Inter, Arial, sans-serif; fill: #dbeafe; }
      .box { fill: #ffffff; stroke: #bfdbfe; stroke-width: 2; rx: 16; filter: url(#shadow); }
      .core { fill: url(#panel); stroke: #99f6e4; }
      .arrow { stroke: #5eead4; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .brand { font: 800 15px Inter, Arial, sans-serif; fill: #dbeafe; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g opacity="0.22">
    <circle cx="1360" cy="150" r="220" fill="#2563eb"/>
    <circle cx="210" cy="760" r="260" fill="#10b981"/>
  </g>

  <text x="84" y="132" class="title">Production AI Architecture</text>
  <text x="84" y="205" class="title">Is Messy</text>
  <text x="88" y="254" class="subtitle">The solution is not one more framework. It is a governed AI platform.</text>

  <g transform="translate(92 318)">
    <rect class="chip" width="210" height="52" rx="26"/>
    <text x="28" y="34" class="chip-text">Agent frameworks</text>
    <rect class="chip" x="232" width="145" height="52" rx="26"/>
    <text x="260" y="34" class="chip-text">RAG</text>
    <rect class="chip" x="400" width="190" height="52" rx="26"/>
    <text x="428" y="34" class="chip-text">Legacy APIs</text>
    <rect class="chip" x="612" width="205" height="52" rx="26"/>
    <text x="640" y="34" class="chip-text">Observability</text>
  </g>

  <g transform="translate(150 430)">
    <rect class="box" width="230" height="116"/>
    <text x="26" y="42" class="label">Use cases</text>
    <text x="26" y="72" class="small">Assistants, search,</text>
    <text x="26" y="94" class="small">extraction, actions</text>

    <rect class="box" x="300" y="-42" width="230" height="116"/>
    <text x="326" y="0" class="label">Models</text>
    <text x="326" y="30" class="small">LLMs, SLMs,</text>
    <text x="326" y="52" class="small">routing, fallback</text>

    <rect class="box" x="300" y="150" width="230" height="116"/>
    <text x="326" y="192" class="label">Data</text>
    <text x="326" y="222" class="small">Documents, metadata,</text>
    <text x="326" y="244" class="small">entitlements</text>

    <rect class="box core" x="640" y="26" width="310" height="158"/>
    <text x="674" y="83" class="label">AI Platform Core</text>
    <text x="674" y="116" class="small">Gateway, orchestration,</text>
    <text x="674" y="140" class="small">evaluation, policy, trace</text>

    <rect class="box" x="1070" width="250" height="116"/>
    <text x="1098" y="42" class="label">Enterprise systems</text>
    <text x="1098" y="72" class="small">Core apps, workflow,</text>
    <text x="1098" y="94" class="small">CRM, data platforms</text>

    <path class="arrow" d="M380 488 C455 488, 555 510, 640 525"/>
    <path class="arrow" d="M530 446 C585 456, 610 480, 640 505"/>
    <path class="arrow" d="M530 638 C585 610, 610 585, 640 558"/>
    <path class="arrow" d="M950 535 C1014 516, 1032 488, 1070 488"/>
  </g>

  <g transform="translate(1354 52) scale(0.12)" opacity="0.9">
    <polygon points="250,12 318,92 423,86 416,196 488,250 416,304 423,414 318,408 250,488 182,408 77,414 84,304 12,250 84,196 77,86 182,92" fill="#050505" stroke="#a3a3a3" stroke-width="30" stroke-linejoin="round"/>
    <polygon points="250,32 308,108 404,104 396,202 462,250 396,298 404,396 308,392 250,468 192,392 96,396 104,298 38,250 104,202 96,104 192,108" fill="none" stroke="#525252" stroke-width="10" stroke-linejoin="round"/>
    <ellipse cx="185" cy="195" rx="72" ry="58" fill="#fff" stroke="#111827" stroke-width="6"/>
    <ellipse cx="315" cy="195" rx="72" ry="58" fill="#fff" stroke="#111827" stroke-width="6"/>
    <circle cx="185" cy="195" r="26" fill="#000"/>
    <circle cx="315" cy="195" r="26" fill="#000"/>
    <rect x="225" y="210" width="24" height="118" rx="12" fill="#fff"/>
    <rect x="150" y="240" width="24" height="132" rx="12" fill="#fff"/>
    <rect x="350" y="240" width="24" height="132" rx="12" fill="#fff"/>
  </g>
  <text x="1340" y="138" class="brand">mohitkanwar.com</text>
</svg>
