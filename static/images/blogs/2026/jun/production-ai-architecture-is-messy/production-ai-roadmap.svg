<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="850" viewBox="0 0 1500 850" role="img" aria-labelledby="title desc">
  <title id="title">Production AI delivery roadmap</title>
  <desc id="desc">A phased roadmap for moving enterprise AI from demos to production using use-case inventory, platform foundations, RAG discipline, safe tools, evaluation, and operational hardening.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 800 34px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px Inter, Arial, sans-serif; fill: #475569; }
      .phase-num { font: 900 24px Inter, Arial, sans-serif; fill: #ffffff; }
      .phase-title { font: 800 17px Inter, Arial, sans-serif; fill: #0f172a; }
      .phase-time { font: 750 13px Inter, Arial, sans-serif; fill: #2563eb; }
      .phase-text { font: 500 12.5px Inter, Arial, sans-serif; fill: #475569; }
      .brand { font: 800 13px Inter, Arial, sans-serif; fill: #334155; }
      .card { fill: #ffffff; stroke: #dbeafe; stroke-width: 1.5; rx: 16; filter: url(#shadow); }
      .num { fill: #2563eb; }
      .line { stroke: #94a3b8; stroke-width: 4; stroke-linecap: round; }
      .dot { fill: #2563eb; stroke: #ffffff; stroke-width: 5; }
      .guard { fill: #0f172a; opacity: 0.94; }
      .guard-title { font: 800 15px Inter, Arial, sans-serif; fill: #ffffff; }
      .guard-note { font: 600 12px Inter, Arial, sans-serif; fill: #cbd5e1; }
    </style>
  </defs>

  <rect width="1500" height="850" fill="url(#bg)"/>
  <text x="48" y="58" class="title">Production AI Delivery Roadmap</text>
  <text x="48" y="88" class="subtitle">A practical path from isolated demos to governed, observable, reusable AI capabilities.</text>

  <g transform="translate(1364 28) scale(0.13)" opacity="0.9">
    <polygon points="250,12 318,92 423,86 416,196 488,250 416,304 423,414 318,408 250,488 182,408 77,414 84,304 12,250 84,196 77,86 182,92" fill="#050505" stroke="#a3a3a3" stroke-width="30" stroke-linejoin="round"/>
    <polygon points="250,32 308,108 404,104 396,202 462,250 396,298 404,396 308,392 250,468 192,392 96,396 104,298 38,250 104,202 96,104 192,108" fill="none" stroke="#525252" stroke-width="10" stroke-linejoin="round"/>
    <ellipse cx="185" cy="195" rx="72" ry="58" fill="#fff" stroke="#111827" stroke-width="6"/>
    <ellipse cx="315" cy="195" rx="72" ry="58" fill="#fff" stroke="#111827" stroke-width="6"/>
    <circle cx="185" cy="195" r="26" fill="#000"/>
    <circle cx="315" cy="195" r="26" fill="#000"/>
    <rect x="225" y="210" width="24" height="118" rx="12" fill="#fff"/>
    <rect x="150" y="240" width="24" height="132" rx="12" fill="#fff"/>
    <rect x="350" y="240" width="24" height="132" rx="12" fill="#fff"/>
  </g>
  <text x="1346" y="112" class="brand">mohitkanwar.com</text>

  <line x1="150" y1="220" x2="1340" y2="220" class="line"/>
  <circle cx="150" cy="220" r="13" class="dot"/>
  <circle cx="388" cy="220" r="13" class="dot"/>
  <circle cx="626" cy="220" r="13" class="dot"/>
  <circle cx="864" cy="220" r="13" class="dot"/>
  <circle cx="1102" cy="220" r="13" class="dot"/>
  <circle cx="1340" cy="220" r="13" class="dot"/>

  <g transform="translate(50 270)">
    <rect class="card" width="214" height="238"/>
    <circle class="num" cx="34" cy="38" r="24"/>
    <text x="27" y="47" class="phase-num">1</text>
    <text x="70" y="35" class="phase-title">Classify Use Cases</text>
    <text x="70" y="58" class="phase-time">Weeks 1-4</text>
    <text x="24" y="96" class="phase-text">Q&amp;A, extraction,</text>
    <text x="24" y="120" class="phase-text">summarization, action</text>
    <text x="24" y="144" class="phase-text">Risk and value scoring</text>
    <text x="24" y="168" class="phase-text">Data access review</text>
  </g>

  <g transform="translate(288 270)">
    <rect class="card" width="214" height="238"/>
    <circle class="num" cx="34" cy="38" r="24"/>
    <text x="27" y="47" class="phase-num">2</text>
    <text x="70" y="35" class="phase-title">Platform Base</text>
    <text x="70" y="58" class="phase-time">Weeks 3-8</text>
    <text x="24" y="96" class="phase-text">Model gateway</text>
    <text x="24" y="120" class="phase-text">Prompt contracts</text>
    <text x="24" y="144" class="phase-text">Cost and latency budgets</text>
    <text x="24" y="168" class="phase-text">Trace schema</text>
  </g>

  <g transform="translate(526 270)">
    <rect class="card" width="214" height="238"/>
    <circle class="num" cx="34" cy="38" r="24"/>
    <text x="27" y="47" class="phase-num">3</text>
    <text x="70" y="35" class="phase-title">RAG Discipline</text>
    <text x="70" y="58" class="phase-time">Months 2-4</text>
    <text x="24" y="96" class="phase-text">Source ownership</text>
    <text x="24" y="120" class="phase-text">Metadata and lineage</text>
    <text x="24" y="144" class="phase-text">Retrieval evaluation</text>
    <text x="24" y="168" class="phase-text">Access filtering</text>
  </g>

  <g transform="translate(764 270)">
    <rect class="card" width="214" height="238"/>
    <circle class="num" cx="34" cy="38" r="24"/>
    <text x="27" y="47" class="phase-num">4</text>
    <text x="70" y="35" class="phase-title">Safe Tools</text>
    <text x="70" y="58" class="phase-time">Months 3-5</text>
    <text x="24" y="96" class="phase-text">Read-only first</text>
    <text x="24" y="120" class="phase-text">Idempotent actions</text>
    <text x="24" y="144" class="phase-text">Human approvals</text>
    <text x="24" y="168" class="phase-text">Legacy wrappers</text>
  </g>

  <g transform="translate(1002 270)">
    <rect class="card" width="214" height="238"/>
    <circle class="num" cx="34" cy="38" r="24"/>
    <text x="27" y="47" class="phase-num">5</text>
    <text x="70" y="35" class="phase-title">Evaluate</text>
    <text x="70" y="58" class="phase-time">Months 4-6</text>
    <text x="24" y="96" class="phase-text">Golden datasets</text>
    <text x="24" y="120" class="phase-text">Prompt regression</text>
    <text x="24" y="144" class="phase-text">Safety and PII checks</text>
    <text x="24" y="168" class="phase-text">Human feedback loop</text>
  </g>

  <g transform="translate(1240 270)">
    <rect class="card" width="214" height="238"/>
    <circle class="num" cx="34" cy="38" r="24"/>
    <text x="27" y="47" class="phase-num">6</text>
    <text x="70" y="35" class="phase-title">Operate</text>
    <text x="70" y="58" class="phase-time">Ongoing</text>
    <text x="24" y="96" class="phase-text">Dashboards</text>
    <text x="24" y="120" class="phase-text">Runbooks</text>
    <text x="24" y="144" class="phase-text">Incident review</text>
    <text x="24" y="168" class="phase-text">Model change control</text>
  </g>

  <g transform="translate(50 575)">
    <rect class="guard" width="1404" height="144" rx="18"/>
    <text x="28" y="38" class="guard-title">Continuous Governance Across The Roadmap</text>
    <text x="28" y="72" class="guard-note">Security and privacy</text>
    <text x="248" y="72" class="guard-note">Architecture review</text>
    <text x="462" y="72" class="guard-note">Model and prompt versioning</text>
    <text x="760" y="72" class="guard-note">Cost controls</text>
    <text x="930" y="72" class="guard-note">Production support</text>
    <text x="1148" y="72" class="guard-note">Business ownership</text>
    <text x="28" y="112" class="guard-note">The goal is not to standardize creativity. The goal is to make production behavior explainable, supportable, and safe.</text>
  </g>
</svg>
