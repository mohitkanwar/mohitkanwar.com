<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Customer 360 data flow and control plane</title>
  <desc id="desc">Data flow from source systems through landing, quality, identity resolution, consent checks, serving APIs, observability, and manual stewardship.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfcfd"/>
      <stop offset="100%" stop-color="#edf6f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#06313a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#527d85"/>
    </marker>
    <symbol id="mkLogo" viewBox="0 0 100 100">
      <polygon points="50 4 64 26 91 24 77 49 97 70 70 76 64 97 50 81 36 97 30 76 3 70 23 49 9 24 36 26" fill="#111111" stroke="#a5aaad" stroke-width="8" stroke-linejoin="round"/>
      <polygon points="50 13 61 31 82 29 70 49 86 66 65 70 60 87 50 73 40 87 35 70 14 66 30 49 18 29 39 31" fill="#050505" stroke="#3f4447" stroke-width="3" stroke-linejoin="round"/>
      <ellipse cx="37" cy="42" rx="17" ry="13" fill="#ffffff"/>
      <ellipse cx="63" cy="42" rx="17" ry="13" fill="#ffffff"/>
      <circle cx="37" cy="42" r="5.8" fill="#000000"/>
      <circle cx="63" cy="42" r="5.8" fill="#000000"/>
      <rect x="31" y="55" width="5" height="22" rx="2.5" fill="#ffffff"/>
      <rect x="64" y="55" width="5" height="22" rx="2.5" fill="#ffffff"/>
      <rect x="47" y="48" width="6" height="20" rx="3" fill="#ffffff"/>
    </symbol>
    <style>
      .title{font-family:Inter,Arial,sans-serif;font-size:30px;font-weight:800;fill:#17313a}
      .label{font-family:Inter,Arial,sans-serif;font-size:20px;font-weight:700;fill:#17313a}
      .small{font-family:Inter,Arial,sans-serif;font-size:13px;fill:#526c74}
      .tiny{font-family:Inter,Arial,sans-serif;font-size:12px;fill:#526c74}
      .box{fill:#ffffff;stroke:#c8dadd;stroke-width:1.5;rx:18;filter:url(#shadow)}
      .accent{fill:#073f4c;stroke:#073f4c;stroke-width:1.5;rx:20;filter:url(#shadow)}
      .accentText{font-family:Inter,Arial,sans-serif;font-size:19px;font-weight:800;fill:#ffffff}
      .accentSub{font-family:Inter,Arial,sans-serif;font-size:12px;fill:#d5eeeb}
      .control{fill:#fff6dd;stroke:#d8b446;stroke-width:1.5;rx:18;filter:url(#shadow)}
      .line{stroke:#527d85;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .dashed{stroke:#d8b446;stroke-width:2;stroke-dasharray:8 8;fill:none;marker-end:url(#arrow)}
      .brandText{font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:800;fill:#17313a}
    </style>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <text x="54" y="62" class="title">Customer 360 Data Flow</text>
  <text x="54" y="90" class="small">The flow that worked for us: move data carefully, keep quality visible, and put consent checks in the serving path.</text>

  <g aria-label="Mohit Kanwar logo">
    <rect x="1034" y="24" width="190" height="54" rx="27" fill="#ffffff" stroke="#c7d9dc" filter="url(#shadow)"/>
    <use href="#mkLogo" x="1046" y="32" width="38" height="38"/>
    <text x="1094" y="56" class="brandText">mohitkanwar.com</text>
  </g>

  <rect x="58" y="154" width="170" height="96" class="box"/>
  <text x="82" y="190" class="label">Sources</text>
  <text x="82" y="216" class="small">Core, cards, CRM,</text>
  <text x="82" y="238" class="small">loans, channels</text>

  <rect x="284" y="154" width="170" height="96" class="box"/>
  <text x="308" y="190" class="label">Landing</text>
  <text x="308" y="216" class="small">Raw events, CDC,</text>
  <text x="308" y="238" class="small">batch snapshots</text>

  <rect x="510" y="154" width="170" height="96" class="box"/>
  <text x="534" y="190" class="label">Quality</text>
  <text x="534" y="216" class="small">Validation, standard</text>
  <text x="534" y="238" class="small">formats, rules</text>

  <rect x="736" y="154" width="170" height="96" class="accent"/>
  <text x="760" y="190" class="accentText">Identity</text>
  <text x="760" y="216" class="accentSub">Match, merge, split,</text>
  <text x="760" y="238" class="accentSub">confidence score</text>

  <rect x="962" y="154" width="170" height="96" class="box"/>
  <text x="986" y="190" class="label">Profile Store</text>
  <text x="986" y="216" class="small">Golden record and</text>
  <text x="986" y="238" class="small">derived attributes</text>

  <rect x="58" y="360" width="214" height="116" class="control"/>
  <text x="88" y="398" class="label">Consent Rules</text>
  <text x="88" y="425" class="small">Purpose, role, geography,</text>
  <text x="88" y="448" class="small">product eligibility</text>

  <rect x="338" y="360" width="214" height="116" class="box"/>
  <text x="368" y="398" class="label">Profile API</text>
  <text x="368" y="425" class="small">Read model by journey,</text>
  <text x="368" y="448" class="small">cache, audit, throttle</text>

  <rect x="618" y="360" width="214" height="116" class="box"/>
  <text x="648" y="398" class="label">Channel BFF</text>
  <text x="648" y="425" class="small">Mobile, web, branch,</text>
  <text x="648" y="448" class="small">contact center views</text>

  <rect x="898" y="360" width="214" height="116" class="box"/>
  <text x="928" y="398" class="label">Journeys</text>
  <text x="928" y="425" class="small">Service, next action,</text>
  <text x="928" y="448" class="small">offers, risk checks</text>

  <rect x="284" y="570" width="254" height="86" class="control"/>
  <text x="314" y="604" class="label">Stewardship Queue</text>
  <text x="314" y="631" class="small">Low confidence matches and data disputes</text>

  <rect x="646" y="570" width="254" height="86" class="control"/>
  <text x="676" y="604" class="label">Observability</text>
  <text x="676" y="631" class="small">Freshness, lineage, errors, SLA breaches</text>

  <path d="M228 202 L284 202" class="line"/>
  <path d="M454 202 L510 202" class="line"/>
  <path d="M680 202 L736 202" class="line"/>
  <path d="M906 202 L962 202" class="line"/>
  <path d="M1047 250 C1047 302, 445 302, 445 360" class="line"/>
  <path d="M272 418 L338 418" class="dashed"/>
  <path d="M552 418 L618 418" class="line"/>
  <path d="M832 418 L898 418" class="line"/>
  <path d="M821 250 C821 324, 850 344, 850 500 C850 536, 474 536, 411 570" class="line"/>
  <path d="M1047 250 C1165 320, 1165 530, 900 530 C832 530, 773 548, 773 570" class="line"/>

  <rect x="54" y="700" width="1172" height="34" rx="17" fill="#17313a" opacity="0.94"/>
  <text x="84" y="722" class="accentSub">A Customer 360 system fails quietly when data freshness and consent are treated as documentation. They have to be executable controls.</text>
</svg>
