<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Customer 360 reference architecture for banks</title>
  <desc id="desc">A readable three-column Customer 360 architecture for banks, showing source systems, platform layers, consumers, governance, and consent controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbfc"/>
      <stop offset="60%" stop-color="#eef7f7"/>
      <stop offset="100%" stop-color="#fff8e8"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#073f4c"/>
      <stop offset="100%" stop-color="#0e7c76"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#06313a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#527d85"/>
    </marker>
    <symbol id="mkLogo" viewBox="0 0 100 100">
      <polygon points="50 4 64 26 91 24 77 49 97 70 70 76 64 97 50 81 36 97 30 76 3 70 23 49 9 24 36 26" fill="#111111" stroke="#a5aaad" stroke-width="8" stroke-linejoin="round"/>
      <polygon points="50 13 61 31 82 29 70 49 86 66 65 70 60 87 50 73 40 87 35 70 14 66 30 49 18 29 39 31" fill="#050505" stroke="#3f4447" stroke-width="3" stroke-linejoin="round"/>
      <ellipse cx="37" cy="42" rx="17" ry="13" fill="#ffffff"/>
      <ellipse cx="63" cy="42" rx="17" ry="13" fill="#ffffff"/>
      <circle cx="37" cy="42" r="5.8" fill="#000000"/>
      <circle cx="63" cy="42" r="5.8" fill="#000000"/>
      <rect x="31" y="55" width="5" height="22" rx="2.5" fill="#ffffff"/>
      <rect x="64" y="55" width="5" height="22" rx="2.5" fill="#ffffff"/>
      <rect x="47" y="48" width="6" height="20" rx="3" fill="#ffffff"/>
    </symbol>
    <style>
      .titleText{font-family:Inter,Arial,sans-serif;font-size:30px;font-weight:800;fill:#17313a}
      .sectionTitle{font-family:Inter,Arial,sans-serif;font-size:21px;font-weight:800;fill:#17313a}
      .cardTitle{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:800;fill:#17313a}
      .body{font-family:Inter,Arial,sans-serif;font-size:13px;fill:#526c74}
      .small{font-family:Inter,Arial,sans-serif;font-size:12px;fill:#5b737c}
      .darkTitle{font-family:Inter,Arial,sans-serif;font-size:21px;font-weight:800;fill:#ffffff}
      .darkBody{font-family:Inter,Arial,sans-serif;font-size:12px;fill:#dcf2ef}
      .panel{fill:#ffffff;stroke:#bfd7da;stroke-width:1.5;rx:24;filter:url(#shadow)}
      .card{fill:#ffffff;stroke:#c7d9dc;stroke-width:1.5;rx:17;filter:url(#shadow)}
      .chip{fill:#e7f3f2;stroke:#a6cfca;stroke-width:1;rx:13}
      .guard{fill:#fff6dc;stroke:#d9b84f;stroke-width:1.5;rx:17;filter:url(#shadow)}
      .hub{fill:url(#hub);stroke:#0a6a65;stroke-width:1.5;rx:28;filter:url(#shadow)}
      .line{stroke:#527d85;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .lineSoft{stroke:#7ea5aa;stroke-width:1.8;fill:none;marker-end:url(#arrow);opacity:.9}
      .brandText{font-family:Inter,Arial,sans-serif;font-size:13px;font-weight:800;fill:#17313a}
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>

  <text x="54" y="58" class="titleText">Customer 360 Reference Architecture</text>
  <text x="54" y="86" class="body">Integrate carefully, resolve identity, respect consent, serve journeys, and govern every customer attribute.</text>

  <g aria-label="Mohit Kanwar logo">
    <rect x="1034" y="24" width="190" height="54" rx="27" fill="#ffffff" stroke="#c7d9dc" filter="url(#shadow)"/>
    <use href="#mkLogo" x="1046" y="32" width="38" height="38"/>
    <text x="1094" y="56" class="brandText">mohitkanwar.com</text>
  </g>

  <rect x="48" y="132" width="244" height="474" class="panel"/>
  <text x="76" y="168" class="sectionTitle">Bank Sources</text>
  <text x="76" y="194" class="body">Systems that hold customer facts</text>
  <rect x="76" y="228" width="188" height="42" class="chip"/><text x="96" y="255" class="body">Core banking</text>
  <rect x="76" y="286" width="188" height="42" class="chip"/><text x="96" y="313" class="body">Cards and payments</text>
  <rect x="76" y="344" width="188" height="42" class="chip"/><text x="96" y="371" class="body">Loans and deposits</text>
  <rect x="76" y="402" width="188" height="42" class="chip"/><text x="96" y="429" class="body">CRM and leads</text>
  <rect x="76" y="460" width="188" height="42" class="chip"/><text x="96" y="487" class="body">Contact center</text>
  <rect x="76" y="518" width="188" height="42" class="chip"/><text x="96" y="545" class="body">Digital channels</text>

  <rect x="360" y="124" width="560" height="500" class="panel"/>
  <text x="390" y="164" class="sectionTitle">Customer 360 Platform</text>
  <text x="390" y="190" class="body">A governed read platform, not a dumping ground</text>

  <rect x="392" y="224" width="206" height="110" class="card"/>
  <text x="416" y="257" class="cardTitle">Ingestion</text>
  <text x="416" y="282" class="body">Events, APIs, CDC,</text>
  <text x="416" y="304" class="body">and batch extracts</text>

  <rect x="392" y="376" width="206" height="110" class="card"/>
  <text x="416" y="409" class="cardTitle">Quality</text>
  <text x="416" y="434" class="body">Validation, standard</text>
  <text x="416" y="456" class="body">formats, survivorship</text>

  <rect x="662" y="224" width="226" height="110" class="card"/>
  <text x="686" y="257" class="cardTitle">Identity Resolution</text>
  <text x="686" y="282" class="body">Match, merge, split,</text>
  <text x="686" y="304" class="body">and confidence scoring</text>

  <rect x="662" y="376" width="226" height="110" class="guard"/>
  <text x="686" y="409" class="cardTitle">Consent and Purpose</text>
  <text x="686" y="434" class="body">Role-aware filtering</text>
  <text x="686" y="456" class="body">before data is served</text>

  <rect x="470" y="514" width="340" height="82" class="hub"/>
  <text x="502" y="548" class="darkTitle">Customer Profile Hub</text>
  <text x="502" y="574" class="darkBody">Golden record, relationships, preferences,</text>
  <text x="502" y="594" class="darkBody">risk signals, and clean profile APIs</text>

  <path d="M292 250 C326 250, 342 250, 392 250" class="line"/>
  <path d="M292 430 C326 430, 342 430, 392 430" class="line"/>
  <path d="M598 279 L662 279" class="lineSoft"/>
  <path d="M598 431 L662 431" class="lineSoft"/>
  <path d="M775 334 L775 376" class="lineSoft"/>
  <path d="M495 334 L495 376" class="lineSoft"/>
  <path d="M495 486 C500 512, 536 514, 570 514" class="line"/>
  <path d="M775 486 C770 512, 736 514, 704 514" class="line"/>

  <rect x="988" y="132" width="244" height="474" class="panel"/>
  <text x="1016" y="168" class="sectionTitle">Consumers</text>
  <text x="1016" y="194" class="body">Views used by real journeys</text>
  <rect x="1016" y="228" width="188" height="42" class="chip"/><text x="1036" y="255" class="body">Mobile and web</text>
  <rect x="1016" y="286" width="188" height="42" class="chip"/><text x="1036" y="313" class="body">Branch staff</text>
  <rect x="1016" y="344" width="188" height="42" class="chip"/><text x="1036" y="371" class="body">Relationship mgr.</text>
  <rect x="1016" y="402" width="188" height="42" class="chip"/><text x="1036" y="429" class="body">Campaign systems</text>
  <rect x="1016" y="460" width="188" height="42" class="chip"/><text x="1036" y="487" class="body">Risk and service</text>
  <rect x="1016" y="518" width="188" height="42" class="chip"/><text x="1036" y="545" class="body">Analytics teams</text>

  <path d="M810 555 C880 555, 930 250, 988 250" class="line"/>
  <path d="M810 555 C880 555, 930 370, 988 370" class="line"/>
  <path d="M810 555 C880 555, 930 490, 988 490" class="line"/>

  <rect x="360" y="650" width="560" height="56" rx="22" fill="#17313a" opacity="0.95"/>
  <text x="398" y="674" class="darkBody">Design principle: every attribute needs an owner, freshness rule, consent rule,</text>
  <text x="398" y="696" class="darkBody">and at least one real consumer. Otherwise it does not belong in release one.</text>
</svg>
