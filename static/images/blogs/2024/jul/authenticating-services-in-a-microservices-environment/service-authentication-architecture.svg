<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 760" role="img" aria-labelledby="title desc">
  <title id="title">Service authentication architecture for microservices</title>
  <desc id="desc">A gateway validates external access tokens, exchanges or forwards controlled identity context, and downstream services repeat authorization with their own policies.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-slate" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #dbe4ef; stroke-width: 2; filter: url(#shadow); }
      .soft { fill: #eef6ff; stroke: #b6d4fe; stroke-width: 2; }
      .green { fill: #ecfdf5; stroke: #a7f3d0; stroke-width: 2; }
      .amber { fill: #fffbeb; stroke: #fde68a; stroke-width: 2; }
      .slate { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 2; }
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #475569; }
      .label { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 13px Arial, sans-serif; fill: #475569; }
      .tiny { font: 700 11px Arial, sans-serif; fill: #64748b; letter-spacing: .08em; }
      .arrow-text { font: 700 12px Arial, sans-serif; fill: #334155; }
      .arrow-blue { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .arrow-green { stroke: #059669; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .arrow-slate { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow-slate); }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect class="bg" width="1240" height="760" rx="28"/>
  <text class="title" x="56" y="66">Authenticating services in a microservices environment</text>
  <text class="subtitle" x="56" y="94">Validate the caller at the edge, keep identity propagation intentional, and authorize again where business risk lives.</text>

  <rect class="panel" x="52" y="134" width="260" height="190" rx="18"/>
  <text class="tiny" x="82" y="174">EXTERNAL CALLER</text>
  <text class="label" x="82" y="207">Web, mobile, partner,</text>
  <text class="label" x="82" y="231">or internal channel</text>
  <text class="small" x="82" y="268">Sends access token and</text>
  <text class="small" x="82" y="288">correlation metadata.</text>

  <rect class="soft" x="392" y="134" width="250" height="190" rx="18"/>
  <text class="tiny" x="422" y="174">API GATEWAY</text>
  <text class="label" x="422" y="207">Coarse policy</text>
  <text class="small" x="422" y="239">Validate JWT signature,</text>
  <text class="small" x="422" y="259">issuer, expiry, audience,</text>
  <text class="small" x="422" y="279">route scope, and rate limit.</text>

  <rect class="green" x="792" y="134" width="294" height="190" rx="18"/>
  <text class="tiny" x="822" y="174">IDENTITY PROVIDER</text>
  <text class="label" x="822" y="207">Keycloak or another</text>
  <text class="label" x="822" y="231">OIDC provider</text>
  <text class="small" x="822" y="268">Publishes metadata and</text>
  <text class="small" x="822" y="288">signing keys for validation.</text>

  <rect class="panel" x="214" y="430" width="838" height="232" rx="22"/>
  <text class="tiny" x="250" y="470">PRIVATE SERVICE LAYER</text>
  <text class="subtitle" x="250" y="497">The network is not treated as a trust boundary. Services still enforce their own rules.</text>

  <rect class="amber" x="250" y="530" width="220" height="88" rx="16"/>
  <text class="label" x="278" y="565">Accounts Service</text>
  <text class="small" x="278" y="590">Fine-grained ownership</text>
  <text class="small" x="278" y="608">and account policy checks.</text>

  <rect class="amber" x="520" y="530" width="220" height="88" rx="16"/>
  <text class="label" x="548" y="565">Payments Service</text>
  <text class="small" x="548" y="590">Step-up, limits, maker-</text>
  <text class="small" x="548" y="608">checker, and fraud signals.</text>

  <rect class="amber" x="790" y="530" width="220" height="88" rx="16"/>
  <text class="label" x="818" y="565">Customer Service</text>
  <text class="small" x="818" y="590">Purpose, consent, and</text>
  <text class="small" x="818" y="608">data visibility rules.</text>

  <path class="arrow-blue" d="M312 229 L382 229"/>
  <text class="arrow-text" x="326" y="211">Bearer token</text>

  <path class="arrow-green dash" d="M642 185 C694 140 735 140 792 185"/>
  <text class="arrow-text" x="666" y="137">OIDC metadata and JWKS</text>

  <path class="arrow-green dash" d="M792 270 C735 315 694 315 642 270"/>
  <text class="arrow-text" x="668" y="331">Token validation keys</text>

  <path class="arrow-slate" d="M517 324 L517 388 C517 416 545 430 575 430"/>
  <text class="arrow-text" x="534" y="375">Internal call</text>

  <path class="arrow-slate" d="M575 430 C620 382 715 382 760 430"/>
  <text class="arrow-text" x="616" y="392">User context or service token</text>

  <rect class="slate" x="86" y="566" width="148" height="70" rx="14"/>
  <text class="tiny" x="113" y="598">OBSERVABILITY</text>
  <text class="small" x="112" y="620">Audit, traces, alerts</text>

  <path class="arrow-slate dash" d="M234 601 L250 601"/>

  <g transform="translate(1106 642) scale(.17)">
    <path d="M250 0 L330 93 L461 80 L450 210 L500 250 L450 290 L461 420 L330 407 L250 500 L170 407 L39 420 L50 290 L0 250 L50 210 L39 80 L170 93 Z" fill="#111827"/>
    <path d="M250 0 L330 93 L461 80 L450 210 L500 250 L450 290 L461 420 L330 407 L250 500 L170 407 L39 420 L50 290 L0 250 L50 210 L39 80 L170 93 Z" fill="none" stroke="#9ca3af" stroke-width="34"/>
    <path d="M250 30 L318 110 L430 100 L420 218 L468 250 L420 282 L430 400 L318 390 L250 470 L182 390 L70 400 L80 282 L32 250 L80 218 L70 100 L182 110 Z" fill="none" stroke="#4b5563" stroke-width="18"/>
    <ellipse cx="185" cy="205" rx="76" ry="62" fill="#fff" stroke="#111827" stroke-width="10"/>
    <ellipse cx="315" cy="205" rx="76" ry="62" fill="#fff" stroke="#111827" stroke-width="10"/>
    <circle cx="185" cy="205" r="25" fill="#000"/>
    <circle cx="315" cy="205" r="25" fill="#000"/>
    <rect x="239" y="222" width="22" height="82" rx="11" fill="#fff"/>
    <rect x="145" y="258" width="22" height="120" rx="11" fill="#fff"/>
    <rect x="333" y="258" width="22" height="120" rx="11" fill="#fff"/>
  </g>
  <text class="small" x="1012" y="728">mohitkanwar.com</text>
</svg>
